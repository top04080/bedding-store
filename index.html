<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>恒鵬寢具 | 精選寢具展示</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF8F4;--bg-warm:#F3ECE1;--surface:#FFF;
  --text:#2A2520;--text-muted:#8A8078;
  --accent:#C4956A;--accent-dk:#9E7451;--accent-lt:#F0E4D4;
  --border:#E5DDD3;
  --shadow-sm:0 2px 12px rgba(42,37,32,.07);
  --shadow-md:0 8px 32px rgba(42,37,32,.12);
  --shadow-lg:0 20px 60px rgba(42,37,32,.18);
  --r:14px;--nav-h:68px;
  --font-d:'Cormorant Garamond','Noto Serif TC',serif;
  --font-b:'Nunito','Noto Serif TC',sans-serif;
  --tr:.26s cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
img{display:block;max-width:100%}
button{font-family:var(--font-b);cursor:pointer;border:none;background:none}
input,textarea,select{font-family:var(--font-b)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(250,248,244,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 24px;transition:box-shadow var(--tr)}
nav.scrolled{box-shadow:var(--shadow-sm)}
.nav-logo{font-family:var(--font-d);font-size:1.5rem;font-weight:600;letter-spacing:.04em;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:0px;flex-shrink:0}
.nav-logo span{color:var(--accent)}
.nav-logo-img{height:calc(1.5rem * 3.0);width:auto;object-fit:contain;flex-shrink:0}
.nav-spacer{flex:1}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:.78rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);border-radius:50px;transition:all var(--tr);white-space:nowrap}
.nav-btn:hover{background:var(--bg-warm);color:var(--text)}
.nav-btn.active-admin{background:#2A2520;color:#fff}

/* ── HERO ── */
.hero{height:0;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C4956A' fill-opacity='.045'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none}

/* ── LAYOUT ── */
main{padding-top:var(--nav-h)}
.section{max-width:1340px;margin:0 auto;padding:6px 22px 72px}
.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.section-title{font-family:var(--font-d);font-size:1.6rem;font-weight:400}
.section-title small{display:block;font-family:var(--font-b);font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}

/* ── ALBUMS ── */
#albums-view{display:block}#album-view{display:none}
/* 兩個 view 都是 fixed 面板，window 永遠不捲動，各自管理 scrollTop */
#albums-view,#album-view{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.albums-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:18px}
.album-card{background:var(--surface);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform var(--tr),box-shadow var(--tr);position:relative}
.album-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-md)}
.album-card.drag-over{outline:2px dashed var(--accent);outline-offset:2px}
.album-cover{aspect-ratio:4/3;background:var(--bg-warm);position:relative;overflow:hidden}
.album-cover img{width:100%;height:100%;object-fit:cover;transition:transform .55s ease}
.album-card:hover .album-cover img{transform:scale(1.06)}
.album-cover-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--accent);opacity:.4}
.album-cover-ph svg{width:42px;height:42px}
.album-badge{position:absolute;top:10px;right:10px;background:rgba(250,248,244,.9);backdrop-filter:blur(6px);border-radius:50px;padding:3px 11px;font-size:.7rem;font-weight:700;color:var(--text)}
/* album reorder drag handle */
.album-drag-handle{position:absolute;top:10px;left:10px;display:none;width:28px;height:28px;border-radius:50%;background:rgba(250,248,244,.9);align-items:center;justify-content:center;cursor:grab;color:var(--text-muted);font-size:.9rem}
.admin-mode .album-drag-handle{display:flex}
.album-info{padding:14px 16px 16px}
.album-name{font-family:var(--font-d);font-size:1.1rem;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-desc{font-size:.77rem;color:#C8900A;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.2em}
.album-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.album-arrow{width:26px;height:26px;border-radius:50%;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;color:var(--accent);transition:background var(--tr)}
.album-card:hover .album-arrow{background:var(--accent);color:#fff}

/* ── ALBUM TOPBAR ── */
.album-topbar{display:flex;align-items:center;gap:14px;padding:11px 22px;background:var(--surface);border-bottom:1px solid var(--border)}
.back-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 17px;font-size:.82rem;font-weight:700;color:var(--text-muted);border-radius:50px;border:1.5px solid var(--border);background:var(--bg-warm);cursor:pointer;transition:all var(--tr);flex-shrink:0;white-space:nowrap}
.back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.album-page-title{font-family:var(--font-d);font-size:1.2rem;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── GLOBAL SEARCH (homepage) ── */
.global-search-wrap{display:flex;align-items:center;background:var(--bg-warm);border:1.5px solid var(--border);border-radius:50px;overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr);width:100%;max-width:340px}
.global-search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,149,106,.12)}
.global-search-wrap svg{margin-left:13px;color:var(--text-muted);flex-shrink:0}
.global-search-wrap input{flex:1;padding:8px 13px;background:none;border:none;outline:none;font-size:.85rem;color:var(--text)}
.global-search-wrap input::placeholder{color:var(--text-muted)}
.global-search-clear{padding:0 12px;color:var(--text-muted);cursor:pointer;display:none;font-size:1rem;line-height:1}
.global-search-clear.show{display:block}
/* search results overlay on homepage */
.global-search-results{display:none;margin-top:18px}
.global-search-results.show{display:block}
.gsr-album-title{font-family:var(--font-d);font-size:1rem;font-weight:600;color:var(--text-muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 10px;border-radius:8px;transition:background var(--tr)}
.gsr-album-title:hover{background:var(--bg-warm)}
.gsr-album-title svg{color:var(--accent)}
.gsr-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.gsr-img-card{border-radius:9px;overflow:hidden;cursor:pointer;aspect-ratio:3/2.5;position:relative;box-shadow:var(--shadow-sm);background:var(--bg-warm);transition:transform var(--tr),box-shadow var(--tr)}
.gsr-img-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.gsr-img-card img{width:100%;height:100%;object-fit:cover}
.gsr-caption{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(0,0,0,.6),transparent);color:#fff;font-size:.7rem;padding:8px 8px 5px;opacity:0;transition:opacity var(--tr)}
.gsr-img-card:hover .gsr-caption{opacity:1}
.gsr-back-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;font-size:.82rem;font-weight:700;color:var(--text-muted);border-radius:50px;border:1.5px solid var(--border);background:var(--bg-warm);cursor:pointer;transition:all var(--tr);margin-bottom:16px}
.gsr-back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.gsr-no-result{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:.88rem}
.album-search-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.album-search-wrap{display:flex;align-items:center;flex:1;background:var(--bg-warm);border:1.5px solid var(--border);border-radius:50px;overflow:hidden;transition:border-color var(--tr),box-shadow var(--tr);max-width:380px}
.album-search-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(196,149,106,.12)}
.album-search-wrap svg{margin-left:13px;color:var(--text-muted);flex-shrink:0}
.album-search-wrap input{flex:1;padding:8px 13px;background:none;border:none;outline:none;font-size:.85rem;color:var(--text)}
.album-search-wrap input::placeholder{color:var(--text-muted)}
.search-clear{padding:0 12px;color:var(--text-muted);cursor:pointer;display:none;font-size:1rem}
.search-clear.show{display:block}

/* ── BATCH BAR ── */
#batch-bar{display:none;position:sticky;top:0;z-index:90;background:#2A2520;color:#fff;padding:10px 22px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
#batch-bar.show{display:flex}
.batch-info{font-size:.82rem;font-weight:600}
.batch-actions{display:flex;gap:6px;flex-wrap:wrap}
.batch-btn{padding:6px 14px;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.batch-btn.danger{background:#B00020;color:#fff}.batch-btn.danger:hover{background:#8B0019}
.batch-btn.ghost{background:rgba(255,255,255,.12);color:#fff}.batch-btn.ghost:hover{background:rgba(255,255,255,.22)}
.batch-btn.share{background:rgba(196,149,106,.3);color:#FFEEDD}.batch-btn.share:hover{background:var(--accent);color:#fff}
.batch-btn.move{background:rgba(100,180,255,.25);color:#CCE8FF}.batch-btn.move:hover{background:#1a73e8;color:#fff}
/* non-admin: hide admin-only batch buttons */
body:not(.admin-mode) .admin-only-btn{display:none!important}

/* ── QUICK NAV BUTTONS ── */
.quick-nav{display:flex;flex-wrap:nowrap;gap:6px;justify-content:flex-start;padding:0 0 6px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.quick-nav::-webkit-scrollbar{display:none}
.quick-nav-btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:6px 9px;font-size:.71rem;font-weight:700;color:var(--accent-dk);background:var(--surface);border:1.5px solid var(--accent-lt);border-radius:50px;cursor:pointer;transition:all var(--tr);white-space:nowrap;box-shadow:var(--shadow-sm);letter-spacing:.01em;flex:1;min-width:0}
.quick-nav-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-md)}
.quick-nav-btn svg{flex-shrink:0}
.quick-nav-btn.hot{color:#C0420A;border-color:#FDDBC8;background:#FFF6F0}
.quick-nav-btn.hot:hover{background:linear-gradient(135deg,#E85C1A,#C0420A);border-color:#C0420A;color:#fff}

/* ── CAPACITY BAR ── */
.capacity-bar-bg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.capacity-bar{height:100%;background:var(--accent);border-radius:3px;transition:width .5s}
.capacity-bar.warn{background:#E8A020}.capacity-bar.full{background:#D44}

/* ── IMAGES GRID ── */
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.img-card{background:var(--bg-warm);border-radius:10px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:3/2.5;box-shadow:var(--shadow-sm);transition:transform var(--tr),box-shadow var(--tr)}
.img-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md)}
.img-card.selected{outline:3px solid var(--accent);outline-offset:-3px}
.admin-mode .img-card{cursor:grab}
.admin-mode .img-card.dragging{opacity:.45;transform:scale(.97);cursor:grabbing}
.admin-mode .img-card.drag-over-img{outline:2.5px dashed var(--accent);outline-offset:-2px}
.img-card img{width:100%;height:100%;object-fit:cover;transition:transform .45s ease}
.img-card:hover img{transform:scale(1.05)}
.img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.62) 0%,transparent 55%);opacity:1;transition:opacity var(--tr);display:flex;align-items:flex-end;padding:10px;pointer-events:none}
.img-caption-text{color:#FFE566;font-size:.85rem;font-weight:600;line-height:1.35;word-break:break-all;text-shadow:0 1px 4px rgba(0,0,0,.7);flex:1;padding-right:34px}
/* share btn: always visible */
.img-share-btn{position:absolute;bottom:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;color:var(--accent-dk);box-shadow:0 2px 8px rgba(0,0,0,.22);opacity:1;transition:opacity var(--tr),background var(--tr),transform var(--tr);z-index:5;pointer-events:auto}
.img-share-btn:hover{background:var(--accent);color:#fff;transform:scale(1.1)}
.sel-check{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:none;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;z-index:3}
.img-card.selected .sel-check{display:flex}
.img-admin-btns{position:absolute;top:8px;right:8px;display:none;flex-direction:column;gap:4px}
.admin-mode .img-admin-btns{display:flex}
.ia-btn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:.62rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.18);transition:all var(--tr);border:none;color:var(--text)}
.ia-btn:hover{background:#fff;transform:scale(1.1)}.ia-btn.del:hover{background:#FFE4E4;color:#C00}.ia-btn.edit:hover{background:#EEF6FF;color:#0066CC}.ia-btn.move-img:hover{background:#EEF6FF;color:#0066CC}
.set-cover-btn{position:absolute;top:8px;left:8px;display:none;padding:4px 10px;font-size:.67rem;font-weight:700;background:rgba(255,255,255,.9);border-radius:50px;color:var(--accent-dk);cursor:pointer;border:none;box-shadow:0 2px 8px rgba(0,0,0,.14);transition:all var(--tr)}
.admin-mode .set-cover-btn{display:block}.set-cover-btn:hover{background:var(--accent);color:#fff}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state svg{width:52px;height:52px;opacity:.28;margin:0 auto 14px}
.load-more-wrap{text-align:center;padding:24px 0 0}
.load-more-btn{padding:10px 30px;border:1.5px solid var(--accent);border-radius:50px;color:var(--accent);font-size:.79rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:none;cursor:pointer;transition:all var(--tr)}
.load-more-btn:hover{background:var(--accent);color:#fff}
.batch-hint{font-size:.76rem;color:var(--text-muted);margin-bottom:12px;display:none}

/* ── FULLSCREEN LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column;align-items:stretch;justify-content:stretch;touch-action:none;user-select:none;-webkit-user-select:none}
#lightbox.open{display:flex}
.lb-img-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
#lb-img{max-width:100vw;max-height:100%;object-fit:contain;will-change:transform;pointer-events:none;display:block}
.lb-top-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(to bottom,rgba(0,0,0,.55),transparent);pointer-events:none}
.lb-top-bar>*{pointer-events:auto}
.lb-counter-badge{background:rgba(0,0,0,.5);color:rgba(255,255,255,.8);font-size:.75rem;padding:4px 12px;border-radius:50px;backdrop-filter:blur(6px)}
.lb-top-actions{display:flex;gap:8px}
.lb-action-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all var(--tr);backdrop-filter:blur(6px)}
.lb-action-btn:hover{background:rgba(255,255,255,.25);color:#fff}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.75);cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:all var(--tr);z-index:10}
.lb-nav:hover{background:rgba(255,255,255,.22);color:#fff}
.lb-prev{left:14px}.lb-next{right:14px}
.lb-bottom-bar{padding:12px 18px 20px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);display:flex;flex-direction:column;align-items:center;gap:8px;position:absolute;bottom:0;left:0;right:0;pointer-events:none}
.lb-bottom-bar>*{pointer-events:auto}
.lb-caption-txt{color:#FFE566;font-size:.86rem;font-weight:600;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.lb-share-row{display:flex;gap:8px}
.lb-share-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:50px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.85);font-size:.79rem;font-weight:700;cursor:pointer;transition:all var(--tr);backdrop-filter:blur(4px)}
.lb-share-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
.lb-admin-bar{display:none;gap:8px;align-items:center;width:100%;max-width:420px}
.admin-mode .lb-admin-bar{display:flex}
.lb-cap-input{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;color:#fff;font-size:.82rem;outline:none;flex:1;transition:border-color var(--tr)}
.lb-cap-input:focus{border-color:var(--accent)}
.lb-save-cap{padding:7px 15px;background:var(--accent);color:#fff;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.lb-save-cap:hover{background:var(--accent-dk)}
.lb-zoom-indicator{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:.74rem;font-weight:700;padding:4px 13px;border-radius:50px;opacity:0;transition:opacity .3s;pointer-events:none;backdrop-filter:blur(4px);z-index:10}
.lb-zoom-indicator.show{opacity:1}
.lb-swipe-hint{color:rgba(255,255,255,.35);font-size:.72rem;display:none;align-items:center;gap:5px;pointer-events:none;order:-1}
@media(hover:none){.lb-swipe-hint{display:flex}.lb-nav{display:none}}

/* ── ADMIN PANEL ── */
#panel-backdrop{position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.28);display:none;backdrop-filter:blur(2px)}
#panel-backdrop.open{display:block}
#admin-panel{position:fixed;top:0;right:0;bottom:0;width:min(430px,95vw);z-index:200;background:var(--surface);box-shadow:var(--shadow-lg);transform:translateX(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
#admin-panel.open{transform:translateX(0)}
.panel-header{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:var(--font-d);font-size:1.2rem;font-weight:600;display:flex;align-items:center;gap:9px}
.panel-title svg{color:var(--accent)}
.panel-close{width:30px;height:30px;border-radius:50%;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all var(--tr)}
.panel-close:hover{background:var(--border)}
.panel-body{flex:1;overflow-y:auto;padding:16px}
.panel-section{margin-bottom:20px}
.panel-label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;display:block}
.album-sel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.album-sel-btn{padding:8px 10px;background:var(--bg-warm);border-radius:8px;font-size:.77rem;text-align:left;cursor:pointer;border:1.5px solid transparent;transition:all var(--tr);line-height:1.3}
.album-sel-btn:hover{border-color:var(--accent)}.album-sel-btn.selected{border-color:var(--accent);background:var(--accent-lt);color:var(--accent-dk)}
.album-sel-count{display:block;font-size:.65rem;opacity:.6;margin-top:2px}
/* draggable album list in panel */
.album-sort-list{display:flex;flex-direction:column;gap:6px}
.album-sort-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg-warm);border-radius:9px;border:1.5px solid transparent;cursor:grab;transition:all var(--tr)}
.album-sort-item:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.album-sort-item.dragging{opacity:.5;cursor:grabbing}
.album-sort-item.drag-over{border-color:var(--accent);background:var(--accent-lt)}
.album-sort-grip{color:var(--text-muted);font-size:.9rem;flex-shrink:0}
.album-sort-name{flex:1;font-size:.82rem;font-weight:600}
.album-sort-count{font-size:.72rem;color:var(--text-muted)}
/* info box */
.info-box{background:var(--bg-warm);border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.info-row{display:flex;justify-content:space-between;align-items:center}
.info-label{font-size:.75rem;color:var(--text-muted)}.info-val{font-size:.85rem;font-weight:700}.info-val.accent{color:var(--accent)}
.info-desc{font-size:.75rem;color:var(--text-muted);line-height:1.5;padding-top:5px;border-top:1px solid var(--border)}
.sort-select{padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.78rem;background:var(--surface);color:var(--text);outline:none;cursor:pointer;transition:border-color var(--tr);flex:1}
.sort-select:focus{border-color:var(--accent)}
.field{margin-bottom:11px}
.field label{display:block;font-size:.74rem;font-weight:600;margin-bottom:4px;color:var(--text-muted)}
.field input,.field textarea{width:100%;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;background:var(--bg);transition:border-color var(--tr);outline:none}
.field input:focus,.field textarea:focus{border-color:var(--accent)}.field textarea{resize:vertical;min-height:68px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--r);padding:24px 16px;text-align:center;cursor:pointer;transition:all var(--tr);background:var(--bg)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent-lt)}
.drop-zone svg{width:34px;height:34px;color:var(--accent);opacity:.5;margin:0 auto 9px}
.drop-zone p{font-size:.81rem;color:var(--text-muted);line-height:1.6}.drop-zone strong{color:var(--accent)}
#file-input{display:none}
#upload-list{margin-top:10px;display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto}
.upload-item{background:var(--bg-warm);border-radius:9px;padding:8px 11px;display:flex;align-items:center;gap:9px}
.upload-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--border)}
.upload-info{flex:1;min-width:0}
.upload-name{font-size:.73rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.upload-prog-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.upload-prog-bar{height:100%;background:var(--accent);border-radius:2px;transition:width .12s}
.upload-pct{font-size:.66rem;color:var(--text-muted);text-align:right;margin-top:2px}
.up-done{color:#4CAF50;font-size:.72rem}.up-err{color:#D00;font-size:.72rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 17px;border-radius:8px;font-size:.8rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all var(--tr);width:100%}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(196,149,106,.28)}.btn-primary:hover{background:var(--accent-dk)}
.btn-secondary{background:var(--bg-warm);color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn+.btn{margin-top:7px}
.panel-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}

/* ── MODALS (shared base) ── */
.modal-backdrop{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;backdrop-filter:blur(7px);padding:16px}
.modal-backdrop.open{display:flex}
.modal-card{background:var(--surface);border-radius:20px;padding:32px 28px;width:min(380px,100%);text-align:center;box-shadow:var(--shadow-lg)}
.modal-icon{font-size:2.1rem;margin-bottom:12px}
.modal-title{font-family:var(--font-d);font-size:1.3rem;font-weight:500;margin-bottom:6px}
.modal-sub{font-size:.82rem;color:var(--text-muted);margin-bottom:18px;line-height:1.5}
.modal-card .field{text-align:left}.modal-card .field input{background:var(--bg-warm)}
.modal-err{color:#C00;font-size:.77rem;margin-top:6px;display:none}.modal-err.show{display:block}
.modal-btns{margin-top:16px;display:flex;gap:8px}.modal-btns .btn{flex:1}

/* ── MOVE IMAGE MODAL ── */
#move-img-modal .modal-card{max-width:420px;text-align:left}
.move-album-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;max-height:300px;overflow-y:auto}
.move-album-btn{padding:9px 11px;background:var(--bg-warm);border-radius:9px;font-size:.8rem;text-align:left;cursor:pointer;border:1.5px solid transparent;transition:all var(--tr)}
.move-album-btn:hover{border-color:var(--accent)}.move-album-btn.current{opacity:.4;cursor:default;pointer-events:none}
.move-album-btn .mab-count{font-size:.68rem;color:var(--text-muted);display:block;margin-top:2px}

/* ── SHARE MODAL ── */
#share-modal{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#share-modal.open{display:flex}
@media(min-width:600px){#share-modal{align-items:center}}
.share-card{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:480px;box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .26s ease}
@media(min-width:600px){.share-card{border-radius:20px;width:440px}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.share-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.share-title-row{display:flex;align-items:center;gap:9px;font-family:var(--font-d);font-size:1.1rem;font-weight:600}
.share-title-row svg{color:var(--accent)}
.share-close{width:28px;height:28px;border-radius:50%;background:var(--bg-warm);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.82rem;color:var(--text-muted);border:none;transition:all var(--tr)}
.share-close:hover{background:var(--border)}
.share-body{padding:16px 18px 18px}
.share-preview-wrap{display:none;margin-bottom:12px}
.share-preview-img{width:100%;max-height:180px;object-fit:contain;border-radius:10px;background:var(--bg-warm)}
#share-links{display:flex;flex-direction:column;gap:7px;max-height:180px;overflow-y:auto;margin-bottom:12px}
.share-link-item{display:flex;align-items:center;gap:9px;background:var(--bg-warm);border-radius:9px;padding:8px 12px}
.share-link-thumb{width:34px;height:34px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--border)}
.share-link-url{flex:1;font-size:.72rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:monospace}
.share-link-copy{flex-shrink:0;padding:4px 10px;border-radius:6px;background:var(--accent-lt);color:var(--accent-dk);font-size:.7rem;font-weight:700;cursor:pointer;border:none;transition:all var(--tr)}
.share-link-copy:hover{background:var(--accent);color:#fff}
.share-actions{display:flex;gap:8px}
.share-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:11px 14px;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all var(--tr)}
.share-btn.primary{background:var(--accent);color:#fff}.share-btn.primary:hover{background:var(--accent-dk)}
.share-btn.native{background:var(--text);color:#fff}.share-btn.native:hover{background:#3A3A3A}
.share-btn.disabled{opacity:.45;pointer-events:none}
.share-hint{font-size:.75rem;color:var(--text-muted);text-align:center;margin-top:9px;min-height:1em}



/* ── TOAST ── */
#toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:10px 22px;border-radius:50px;font-size:.81rem;font-weight:500;box-shadow:var(--shadow-md);animation:toastIn .3s ease forwards;pointer-events:auto}
.toast.success{background:#3A7D44}.toast.error{background:#B00020}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── SPINNER ── */
.spinner-wrap{display:flex;justify-content:center;align-items:center;padding:56px;grid-column:1/-1}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FLOATING BACK BUTTON ── */
#float-back-btn{position:fixed;top:calc(var(--nav-h) + 10px);left:12px;z-index:99;display:none;align-items:center;gap:6px;padding:7px 14px;font-size:.78rem;font-weight:700;color:var(--text);border-radius:50px;border:1.5px solid rgba(229,221,211,.7);background:rgba(250,248,244,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;transition:all var(--tr);white-space:nowrap;box-shadow:0 2px 10px rgba(42,37,32,.10)}
#float-back-btn.show{display:inline-flex}
#float-back-btn:hover{background:rgba(196,149,106,.85);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-sm)}

/* ── FLOATING BACK BUTTON (search results on homepage) ── */
#float-search-back-btn{position:fixed;top:calc(var(--nav-h) + 10px);left:12px;z-index:99;display:none;align-items:center;gap:6px;padding:7px 14px;font-size:.78rem;font-weight:700;color:var(--text);border-radius:50px;border:1.5px solid rgba(229,221,211,.7);background:rgba(250,248,244,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);cursor:pointer;transition:all var(--tr);white-space:nowrap;box-shadow:0 2px 10px rgba(42,37,32,.10)}
#float-search-back-btn.show{display:inline-flex}
#float-search-back-btn:hover{background:rgba(196,149,106,.85);color:#fff;border-color:var(--accent);box-shadow:var(--shadow-sm)}

/* ── TOUCH DEVICE: disable hover transforms to fix iOS double-tap ── */
@media (hover:none){
  .album-card:hover{transform:none;box-shadow:var(--shadow-sm)}
  .album-card:hover .album-cover img{transform:none}
  .gsr-img-card:hover{transform:none;box-shadow:var(--shadow-sm)}
  .img-card:hover{transform:none;box-shadow:var(--shadow-sm)}
  .img-card:hover img{transform:none}
}

/* ── CARD SLIDE ANIMATION ── */
@keyframes _cardSlideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
.card-slide-in{animation:_cardSlideIn .32s cubic-bezier(.4,0,.2,1);}
#album-view,#albums-view{will-change:transform}

/* ── RESPONSIVE ── */
@media(max-width:900px){nav{padding:0 16px}.section{padding:22px 13px 56px}.albums-grid{grid-template-columns:repeat(2,1fr);gap:10px}.images-grid{grid-template-columns:repeat(2,1fr);gap:9px}.album-sel-grid{grid-template-columns:1fr}.move-album-grid{grid-template-columns:1fr}}
@media(max-width:480px){.albums-grid{grid-template-columns:repeat(2,1fr);gap:8px}}
</style>

<script>
/* ═══════════════════════════════════════
   ☁️  CLOUDINARY 設定
═══════════════════════════════════════ */
const CLOUD_NAME    = 'dkgdxdayy';
const UPLOAD_PRESET = 'bedding_unsigned';

/* ═══════════════════════════════════════
   📦  JSONBIN 設定
═══════════════════════════════════════ */
const JSONBIN_ID  = '69d70085856a68218912cc85';
const JSONBIN_KEY = '$2a$10$zKaUFojb2ZvEeE/SrDJBtODqvGXMQyLGT/bJC.xgUTecDnE1RXwKq';

/* 管理員密碼（SHA-256 雜湊，明文不儲存在程式碼中） */
const ADMIN_PASSWORD_HASH = 'b4895514b201dd0757818d74110eda1531bc2d3d50bb9ceae7d9409c6a08fd97';
async function hashPassword(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* 20 預設相簿 */
const DEFAULT_ALBUMS = [
  {id:'duvet-sets',   name:'被套組合',   desc:'精選四件組被套床包系列'},
  {id:'fitted-sheets',name:'床包系列',   desc:'各尺寸床包單售'},
  {id:'pillowcases',  name:'枕頭套',     desc:'素色與花色枕頭套'},
  {id:'comforters',   name:'棉被被芯',   desc:'四季適用棉被'},
  {id:'pillows',      name:'枕頭枕芯',   desc:'記憶棉、乳膠、羽絨枕頭'},
  {id:'winter',       name:'冬季系列',   desc:'厚實保暖冬季寢具'},
  {id:'summer',       name:'夏季系列',   desc:'輕薄涼感夏季寢具'},
  {id:'spring-fall',  name:'春秋系列',   desc:'適合過渡季節的中厚款'},
  {id:'solid-colors', name:'素色系列',   desc:'簡約素色設計'},
  {id:'printed',      name:'印花系列',   desc:'精美印花圖案'},
  {id:'embroidered',  name:'刺繡系列',   desc:'精緻刺繡工藝'},
  {id:'plaid',        name:'格紋系列',   desc:'經典格紋設計'},
  {id:'floral',       name:'花卉系列',   desc:'優雅花卉圖案'},
  {id:'geometric',    name:'幾何系列',   desc:'現代幾何圖形'},
  {id:'children',     name:'兒童系列',   desc:'可愛卡通主題'},
  {id:'hotel',        name:'飯店系列',   desc:'五星級飯店規格'},
  {id:'organic',      name:'有機棉系列', desc:'通過認證有機棉'},
  {id:'tencel',       name:'天絲系列',   desc:'TENCEL™天絲纖維'},
  {id:'flannel',      name:'法蘭絨系列', desc:'毛茸茸法蘭絨質地'},
  {id:'sale',         name:'特價專區',   desc:'精選特惠商品'},
];

/* ════════════ STATE ════════════ */
const LS_ALBUMS='hp_albums_v4';
const jbReady=JSONBIN_ID!=='YOUR_BIN_ID'&&JSONBIN_KEY!=='YOUR_MASTER_KEY';
const cloudReady=CLOUD_NAME!=='YOUR_CLOUD_NAME';
let isAdmin=false,allAlbums=[],currentAlbumId=null;
let currentImages=[],filteredImages=[],lbIndex=0;
let selectedIds=new Set(),currentSort='newest',currentPage=0;
const PAGE=40;

/* ════════════ INIT ════════════ */
function init(){
  const saved=localStorage.getItem(LS_ALBUMS);
  allAlbums=saved?JSON.parse(saved):DEFAULT_ALBUMS.map((a,i)=>({...a,coverUrl:'',imageCount:0,order:i,images:[]}));
  renderAlbums(allAlbums);
  if(jbReady) loadFromCloud();
}

/* ════════════ JSONBIN ════════════ */
const JB_URL=`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`;
const JB_HDR={'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Versioning':'false'};
async function jbGet(){const r=await fetch(JB_URL+'/latest',{headers:{'X-Master-Key':JSONBIN_KEY}});if(!r.ok)throw new Error(r.status);return(await r.json()).record;}
async function jbSet(d){const r=await fetch(JB_URL,{method:'PUT',headers:JB_HDR,body:JSON.stringify(d)});if(!r.ok)throw new Error(r.status);}
async function loadFromCloud(){
  try{
    const d=await jbGet();
    if(d.albums&&d.albums.length>0){allAlbums=d.albums;localStorage.setItem(LS_ALBUMS,JSON.stringify(allAlbums));renderAlbums(allAlbums);}
    else await saveToCloud();
  }catch(e){console.warn('JSONBin load fail',e);}
}
async function saveToCloud(){
  if(jbReady)try{await jbSet({albums:allAlbums});}catch(e){console.error('JSONBin save fail',e);showToast('雲端同步失敗（本機已存）','error');}
  localStorage.setItem(LS_ALBUMS,JSON.stringify(allAlbums));
}

/* ════════════ ALBUM HELPERS ════════════ */
function getImages(albumId){return(allAlbums.find(a=>a.id===albumId)?.images)||[];}
async function saveImages(albumId,imgs){
  const a=allAlbums.find(x=>x.id===albumId);
  if(a){a.images=imgs;a.imageCount=imgs.length;}
  await saveToCloud();
}

/* ════════════ RENDER ALBUMS ════════════ */
function renderAlbums(albums){
  const grid=document.getElementById('albums-grid');
  if(!albums.length){grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-muted)">尚無相簿</div>`;return;}
  grid.innerHTML=albums.map(a=>`
    <div class="album-card" data-id="${a.id}" onclick="openAlbum('${a.id}')">
      <div class="album-cover">
        ${a.coverUrl?`<img src="${v(a.coverUrl)}" alt="${v(a.name)}" loading="lazy">`
          :`<div class="album-cover-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:.7rem;font-weight:700;letter-spacing:.06em">尚無圖片</span></div>`}
        <div class="album-badge">${a.imageCount||0} 張</div>
        <div class="album-drag-handle" title="拖曳調整順序">⠿</div>
      </div>
      <div class="album-info">
        <div class="album-name">${v(a.name)}</div>
        <div class="album-desc">${v(a.desc||'')}</div>
      </div>
    </div>`).join('');
  // Album reorder drag (admin)
  if(isAdmin) initAlbumReorder();
  // 更新快速導覽按鈕（最後 4 個相簿）
  renderQuickNav(albums);
}

/* ════════════ QUICK NAV ════════════ */
function renderQuickNav(albums){
  const nav=document.getElementById('quick-nav');
  if(!nav||!albums.length) return;
  const last3=albums.slice(-3);
  // 火焰 SVG (自繪，無外部依賴)
  const flameSvg=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c0 0-4 4-4 9a4 4 0 008 0c0-2-1-4-1-4s-1 3-3 3-2-2-2-4c0-1.5 2-4 2-4z" fill="currentColor" stroke="none"/><path d="M12 22c-3.3 0-6-2.7-6-6 0-4 3-8 6-10 3 2 6 6 6 10 0 3.3-2.7 6-6 6z" fill="none"/><path d="M12 17c-1.1 0-2-.9-2-2 0-1.5 2-3 2-3s2 1.5 2 3c0 1.1-.9 2-2 2z" fill="currentColor" stroke="none"/></svg>`;
  const hotBtn=`<button class="quick-nav-btn hot" onclick="searchHotItems()">
    ${flameSvg}熱銷商品
  </button>`;
  nav.innerHTML=hotBtn+last3.map(a=>`
    <button class="quick-nav-btn" onclick="openAlbum('${a.id}')">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      ${v(a.name)}
    </button>`).join('');
}
function searchHotItems(){
  const inp=document.getElementById('global-search-input');
  inp.value='*';
  document.getElementById('global-search-clear').classList.add('show');
  globalSearch('*');
  document.getElementById('albums-view').scrollTop=0;
}

/* ════════════ ALBUM REORDER (drag-drop) ════════════ */
function initAlbumReorder(){
  document.querySelectorAll('.album-card').forEach(card=>{
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',e=>{e.dataTransfer.setData('albumId',card.dataset.id);card.style.opacity='.5';});
    card.addEventListener('dragend',()=>{card.style.opacity='';document.querySelectorAll('.album-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const fromId=e.dataTransfer.getData('albumId');
      const toId=card.dataset.id;
      if(fromId===toId)return;
      const fi=allAlbums.findIndex(a=>a.id===fromId);
      const ti=allAlbums.findIndex(a=>a.id===toId);
      const [item]=allAlbums.splice(fi,1);
      allAlbums.splice(ti,0,item);
      renderAlbums(allAlbums);
      renderAlbumSortList();
      saveToCloud();
      showToast('✅ 相簿順序已更新','success');
    });
  });
}

/* ════════════ ALBUM SORT LIST (in panel) ════════════ */
function renderAlbumSortList(){
  const list=document.getElementById('album-sort-list');
  list.innerHTML=allAlbums.map((a,i)=>`
    <div class="album-sort-item" data-id="${a.id}" draggable="true">
      <span class="album-sort-grip">⠿</span>
      <span class="album-sort-name">${v(a.name)}</span>
      <span class="album-sort-count">${a.imageCount||0} 張</span>
    </div>`).join('');
  list.querySelectorAll('.album-sort-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{e.dataTransfer.setData('sortId',item.dataset.id);item.classList.add('dragging');});
    item.addEventListener('dragend',()=>{item.classList.remove('dragging');list.querySelectorAll('.album-sort-item').forEach(i=>i.classList.remove('drag-over'));});
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{
      e.preventDefault();item.classList.remove('drag-over');
      const fromId=e.dataTransfer.getData('sortId');
      const toId=item.dataset.id;
      if(fromId===toId)return;
      const fi=allAlbums.findIndex(a=>a.id===fromId);
      const ti=allAlbums.findIndex(a=>a.id===toId);
      const [moved]=allAlbums.splice(fi,1);
      allAlbums.splice(ti,0,moved);
      renderAlbumSortList();
      renderAlbums(allAlbums);
      saveToCloud();
      showToast('✅ 相簿順序已更新','success');
    });
  });

/* ════════════ LOAD / SEARCH IMAGES ════════════ */
let _imgSearchQ='';
function loadImages(){
  const all=sortImgs(getImages(currentAlbumId),currentSort);
  currentImages=all;
  applyImgSearch();
}
function applyImgSearch(){
  const q=_imgSearchQ.toLowerCase().trim();
  filteredImages=q?currentImages.filter(i=>(i.caption||'').toLowerCase().includes(q)):currentImages;
  renderImages(filteredImages, false);
}
function filterImages(q){
  _imgSearchQ=q;currentPage=0;
  document.getElementById('search-clear').classList.toggle('show',q.length>0);
  applyImgSearch();
}
function clearImgSearch(){
  document.getElementById('img-search-input').value='';
  document.getElementById('search-clear').classList.remove('show');
  _imgSearchQ='';currentPage=0;applyImgSearch();
}
function loadMoreImages(){currentPage++;applyImgSearch();}
function sortImgs(imgs,sort){
  if(sort==='manual') return [...imgs];
  if(sort==='name'){
    // 依圖片說明（caption）開頭數字由大至小；無數字則排末尾
    return [...imgs].sort((a,b)=>{
      const na=parseInt((a.caption||a.name||'').match(/^\d+/)?.[0])||0;
      const nb=parseInt((b.caption||b.name||'').match(/^\d+/)?.[0])||0;
      if(nb!==na) return nb-na; // 數字大的優先
      return(b.caption||b.name||'').localeCompare(a.caption||a.name||''); // 同數字再按文字
    });
  }
  const ta_fn=(i)=>new Date(i.uploadedAt||0).getTime();
  return [...imgs].sort((a,b)=>sort==='oldest'?ta_fn(a)-ta_fn(b):ta_fn(b)-ta_fn(a));
}
function syncSortSelect(){const el=document.getElementById('sort-select');if(el)el.value=currentSort;}
function resortImages(sort){
  currentSort=sort;currentPage=0;
  // 儲存此相簿的排序偏好
  const a=allAlbums.find(x=>x.id===currentAlbumId);
  if(a){a.sortMode=sort;saveToCloud();}
  syncSortSelect();loadImages();
}

async function batchDelete(){
  if(!selectedIds.size)return;

  const ids=[...selectedIds];

  renderAlbums(allAlbums);

}

/* ════════════ LIGHTBOX ════════════ */
let lbScale=1,lbTX=0,lbTY=0,_zTimer=null;
let _pinching=false,_pinchD0=0,_pinchS0=1;
let _panning=false,_panX0=0,_panY0=0,_panTX0=0,_panTY0=0;
let _swX=0,_swY=0,_swMoved=false,_lastTap=0;
const lbImgEl=()=>document.getElementById('lb-img');

function openLightbox(idx){
  lbIndex=idx;resetZoom();showLbImg();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLightbox(){
  resetZoom();
  /* ensure pull state is clean */
  const _la=document.getElementById('lb-img-area');
  if(_la){_la.style.transform='';_la.style.transition='';}
  const _lb=document.getElementById('lightbox');
  if(_lb){_lb.style.opacity='';_lb.style.transition='';_lb.style.background='';}
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
function lbNav(d){
  if(lbScale>1){resetZoom();return;}
  const imgs=filteredImages.length?filteredImages:currentImages;
  const newIdx=(lbIndex+d+imgs.length)%imgs.length;
  const el=lbImgEl();
  const outX=d>0?'-110vw':'110vw';
  const inX=d>0?'110vw':'-110vw';
  el.style.transition='transform .38s cubic-bezier(.4,0,.2,1)';
  el.style.transform='translateX('+outX+')';
  setTimeout(()=>{
    lbIndex=newIdx;
    el.style.transition='none';
    el.style.transform='translateX('+inX+')';
    showLbImg();
    el.getBoundingClientRect(); // force reflow
    el.style.transition='transform .38s cubic-bezier(.4,0,.2,1)';
    el.style.transform='translateX(0)';
  },380);
}
function showLbImg(){
  const imgs=filteredImages.length?filteredImages:currentImages;
  const img=imgs[lbIndex];if(!img)return;
  lbImgEl().src=img.url;
  document.getElementById('lb-caption').textContent=img.caption||img.name||'';
  document.getElementById('lb-cap-input').value=img.caption||'';
  document.getElementById('lb-counter').textContent=`${lbIndex+1} / ${imgs.length}`;
}
async function saveLbCaption(){
  const cap=document.getElementById('lb-cap-input').value.trim();
  const imgs=filteredImages.length?filteredImages:currentImages;
  const img=imgs[lbIndex];if(!img)return;
  img.caption=cap;
  let allImgs=getImages(currentAlbumId);
  const fi=allImgs.findIndex(i=>i.id===img.id);
  if(fi>=0)allImgs[fi].caption=cap;
  await saveImages(currentAlbumId,allImgs);
  document.getElementById('lb-caption').textContent=cap;
  applyImgSearch();
  showToast('✅ 說明已儲存','success');
}

/* Zoom */
function applyZoom(scale,tx,ty){
  scale=Math.max(1,Math.min(6,scale));
  const el=lbImgEl();
  const mTX=Math.max(0,(scale-1)*el.offsetWidth/2);
  const mTY=Math.max(0,(scale-1)*el.offsetHeight/2);
  lbTX=tx!==undefined?Math.max(-mTX,Math.min(mTX,tx)):lbTX;
  lbTY=ty!==undefined?Math.max(-mTY,Math.min(mTY,ty)):lbTY;
  if(scale<=1){lbTX=0;lbTY=0;}
  lbScale=scale;
  el.style.transform=`scale(${scale}) translate(${lbTX/scale}px,${lbTY/scale}px)`;
  const ind=document.getElementById('lb-zoom-indicator');
  ind.textContent=Math.round(scale*100)+'%';
  ind.classList.add('show');
  clearTimeout(_zTimer);_zTimer=setTimeout(()=>ind.classList.remove('show'),1200);
}
function resetZoom(){lbScale=1;lbTX=0;lbTY=0;const el=lbImgEl();if(el){el.style.transition='none';el.style.transform='';lbTX=0;lbTY=0;}}

/* Keyboard */
document.addEventListener('keydown',e=>{
  const lb=document.getElementById('lightbox');
  if(!lb.classList.contains('open'))return;
  if(e.key==='ArrowLeft'&&lbScale<=1)lbNav(-1);
  if(e.key==='ArrowRight'&&lbScale<=1)lbNav(1);
  if(e.key==='Escape'){lbScale>1?resetZoom():closeLightbox();}
  if(e.key==='+'||e.key==='=')applyZoom(lbScale*1.25);
  if(e.key==='-')applyZoom(lbScale/1.25);
  if(e.key==='0')resetZoom();
});
/* Desktop double-click to zoom */
document.getElementById('lb-img-area').addEventListener('dblclick',e=>{
  e.preventDefault();
  if(lbScale>1){resetZoom();return;}
  const area=document.getElementById('lb-img-area');
  const W=area.offsetWidth,H=area.offsetHeight;
  const tx=(e.clientX-W/2)*(1-2.5);
  const ty=(e.clientY-H/2)*(1-2.5);
  applyZoomSmooth(2.5,tx,ty);
});


/* Smooth zoom (adds transition for double-tap / double-click) */
function applyZoomSmooth(scale,tx,ty){
  const el=lbImgEl();
  el.style.transition='transform .25s cubic-bezier(.4,0,.2,1)';
  applyZoom(scale,tx,ty);
  setTimeout(()=>{if(el)el.style.transition='';},260);
}

/* Touch: pinch zoom + pan + double-tap-to-zoom + swipe-left/right + swipe-down-dismiss */
function _dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
const lbArea=document.getElementById('lb-img-area');
const lbEl=document.getElementById('lightbox');
// _gestureDir: null=undecided, 'h'=horizontal swipe, 'v'=vertical pull
let _pullDY=0,_gestureDir=null;

function _lbSetPull(dy){
  const prog=Math.min(1,Math.abs(dy)/220);
  lbEl.style.background='rgba(0,0,0,'+(1*(1-prog*0.7))+')';
  lbArea.style.transform='translateY('+dy+'px)';
}
function _lbResetPull(){
  lbArea.style.transition='transform .28s cubic-bezier(.4,0,.2,1)';
  lbArea.style.transform='translateY(0)';
  lbEl.style.background='';
  setTimeout(()=>{lbArea.style.transition='';},300);
}
function _lbDismissPull(){
  lbArea.style.transition='transform .26s cubic-bezier(.4,0,.2,1)';
  lbArea.style.transform='translateY('+window.innerHeight+'px)';
  lbEl.style.transition='opacity .26s';lbEl.style.opacity='0';
  setTimeout(()=>{
    lbArea.style.transition='';lbArea.style.transform='';
    lbEl.style.transition='';lbEl.style.opacity='';
    closeLightbox();
  },260);
}

lbArea.addEventListener('touchstart',e=>{
  const ts=e.touches;
  if(ts.length===2){
    _pinching=true;_panning=false;_swMoved=false;_gestureDir=null;
    _pinchD0=_dist(ts);_pinchS0=lbScale;
    e.preventDefault();
  }else if(ts.length===1){
    _swX=ts[0].clientX;_swY=ts[0].clientY;_swMoved=false;
    _gestureDir=null;_pullDY=0;
    if(lbScale>1){_panning=true;_panX0=ts[0].clientX;_panY0=ts[0].clientY;_panTX0=lbTX;_panTY0=lbTY;}
    else _panning=false;
    /* double-tap: detect on touchstart for instant response */
    const now=Date.now();
    if(now-_lastTap<300&&now-_lastTap>30){
      if(lbScale>1){resetZoom();}
      else{
        const W=lbArea.offsetWidth,H=lbArea.offsetHeight;
        applyZoomSmooth(2.5,(ts[0].clientX-W/2)*(1-2.5),(ts[0].clientY-H/2)*(1-2.5));
      }
      _lastTap=0;
    }else{_lastTap=now;}
  }
},{passive:false});

lbArea.addEventListener('touchmove',e=>{
  const ts=e.touches;
  if(ts.length===2&&_pinching){
    e.preventDefault();
    applyZoom(_pinchS0*(_dist(ts)/_pinchD0));
    return;
  }
  if(ts.length!==1)return;
  const dx=ts[0].clientX-_swX,dy=ts[0].clientY-_swY;
  if(Math.abs(dx)>4||Math.abs(dy)>4)_swMoved=true;
  if(_panning&&lbScale>1){
    e.preventDefault();
    applyZoom(lbScale,_panTX0+(ts[0].clientX-_panX0),_panTY0+(ts[0].clientY-_panY0));
    return;
  }
  if(lbScale>1)return;
  /* lock gesture direction once movement passes threshold */
  if(!_gestureDir&&(Math.abs(dx)>12||Math.abs(dy)>12)){
    _gestureDir=Math.abs(dy)>Math.abs(dx)*1.1?'v':'h';
  }
  if(_gestureDir==='v'){
    e.preventDefault();
    _pullDY=dy;
    _lbSetPull(dy<0?dy*0.2:dy);
  }
  /* 'h': no preventDefault needed, handled in touchend */
},{passive:false});

lbArea.addEventListener('touchend',e=>{
  if(_pinching&&e.touches.length<2){_pinching=false;if(lbScale<1.05)resetZoom();return;}
  if(_gestureDir==='v'){
    if(_pullDY>100){_lbDismissPull();}else{_lbResetPull();}
    _gestureDir=null;_pullDY=0;return;
  }
  /* horizontal confirmed OR direction undecided (quick flick) → check for swipe */
  if(!_pinching&&!_panning&&_swMoved&&lbScale<=1){
    const fdx=e.changedTouches[0].clientX-_swX;
    const fdy=e.changedTouches[0].clientY-_swY;
    if(Math.abs(fdx)>45&&Math.abs(fdx)>Math.abs(fdy)){lbNav(fdx<0?1:-1);}
  }
  _panning=false;_gestureDir=null;_pullDY=0;
},{passive:true});

/* Mouse wheel zoom */
lbArea.addEventListener('wheel',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  e.preventDefault();
  applyZoom(lbScale*(e.deltaY>0?0.85:1.18));
},{passive:false});

      // incoming home-view: fixed, off-screen left
      hv.style.display='block';
      hv.style.position='fixed';hv.style.top=top;hv.style.left='0';
      hv.style.width='100%';hv.style.height=h;
      hv.style.zIndex='50';hv.style.overflowY='auto';
      hv.style.background='var(--bg)';
      hv.style.transform='translateX(-100%)';
      hv.scrollTop=_homeScrollY; // 動畫期間首頁面板就顯示正確捲動位置
      // outgoing album-view: fixed, on top
      av.style.position='fixed';av.style.top=top;av.style.left='0';
      av.style.width='100%';av.style.height=h;
      av.style.zIndex='51';av.style.overflowY='auto';
      av.style.background='var(--bg)';
      // Restore scroll position so view does not jump to top
      av.scrollTop=savedScrollY;
    }
  }

  /* Both panels follow the finger 1:1 */
  function _cswSetPull(dx,action){
    _cswPrepare(action);
    if(action==='album'){
      _avEl().style.transform='translateX('+dx+'px)';
      // home-view lags slightly (parallax feel: 40% speed)
      _hvEl().style.transform='translateX(calc(-100% + '+dx*0.6+'px))';
    }else{
      const hv=_hvEl();
      hv.style.transform='translateX('+dx+'px)';
      document.querySelector('main').style.opacity=(1-Math.min(dx/window.innerWidth,1)*0.6).toFixed(3);
    }
  }

  function _avClean(){
    const av=_avEl();
    ['position','top','left','width','height','zIndex','overflowY','background','transform','transition'].forEach(p=>av.style[p]='');
  }
  function _hvClean(hide){
    const hv=_hvEl();
    if(hide)hv.style.display='none'; else hv.style.display='';
    ['position','top','left','width','height','zIndex','overflowY','background','transform','transition'].forEach(p=>hv.style[p]='');
  }

  /* Spring back: both panels return to original positions */
  function _cswReset(action){
    if(!_cswPrepared)return;
    if(action==='album'){
      const av=_avEl(),hv=_hvEl();
      av.style.transition='transform '+DUR;
      hv.style.transition='transform '+DUR;
      av.style.transform='translateX(0)';
      hv.style.transform='translateX(-100%)';
      setTimeout(()=>{
        _avClean();_hvClean(true);_cswPrepared=false;
        // 面板 scrollTop 自動保留，不需要額外還原
      },460);
    }else{
      const hv=_hvEl(),m=document.querySelector('main');
      hv.style.transition='transform '+DUR;
      hv.style.transform='';
      m.style.transition='opacity '+DUR;
      m.style.opacity='';
      setTimeout(()=>{hv.style.transition='';m.style.transition='';_cswPrepared=false;},460);
    }
  }

  /* Dismiss: album-view flies right, home-view settles to centre */
  function _cswDismiss(action){
    if(!_cswPrepared){if(action==='album')goHome();else clearGlobalSearch();return;}
    if(action==='album'){
      const av=_avEl(),hv=_hvEl();
      av.style.transition='transform '+DUR;
      hv.style.transition='transform '+DUR;
      av.style.transform='translateX('+window.innerWidth+'px)';
      hv.style.transform='translateX(0)';
      setTimeout(()=>{
        _avClean();_hvClean(false);_cswPrepared=false;
        goHome(); // goHome 直接設定 albums-view.scrollTop，無跳動
      },460);
    }else{
      const hv=_hvEl(),m=document.querySelector('main');
      hv.style.transition='transform '+DUR;
      hv.style.transform='translateX('+window.innerWidth+'px)';
      m.style.transition='opacity '+DUR;
      m.style.opacity='0';
      setTimeout(()=>{
        hv.style.transition='';hv.style.transform='';
        m.style.transition='';m.style.opacity='';
        _cswPrepared=false;clearGlobalSearch();
      },460);
    }
  }

  document.addEventListener('touchstart',e=>{
    if(e.touches.length!==1){_cswActive=false;return;}
    const t=_cswGetTarget();
    if(!t){_cswActive=false;return;}
    _cswAction=t.action;
    _cswX=e.touches[0].clientX;_cswY=e.touches[0].clientY;
    _cswActive=true;_cswLocked=false;
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!_cswActive)return;
    const dx=e.touches[0].clientX-_cswX;
    const dy=e.touches[0].clientY-_cswY;
    if(!_cswLocked){
      if(Math.abs(dx)<6&&Math.abs(dy)<6)return;
      // 方向鎖定：允許斜向滑動（比例放寬至 1.2），且須向右滑
      if(Math.abs(dy)>Math.abs(dx)*1.2||dx<5){_cswActive=false;return;}
      _cswLocked=true;
    }
    if(dx>0)_cswSetPull(dx,_cswAction);
  },{passive:true});

  document.addEventListener('touchend',e=>{
    if(!_cswActive)return;
    _cswActive=false;
    const action=_cswAction;_cswAction=null;
    const dx=e.changedTouches[0].clientX-_cswX;
    const dy=e.changedTouches[0].clientY-_cswY;
    // 降低觸發閾值至 1/5 螢幕寬，提高右滑靈敏度
    if(_cswLocked&&dx>window.innerWidth/5&&Math.abs(dy)<Math.abs(dx)*0.65){
      _cswDismiss(action);
    }else{
      _cswReset(action);
    }
  },{passive:true});

  document.addEventListener('touchcancel',()=>{
    if(_cswPrepared)_cswReset(_cswAction||'album');
    _cswActive=false;_cswAction=null;
  },{passive:true});
}

/* 以圖片方式分享（Web Share API files）*/
async function shareAsImages(){
  const hint=document.getElementById('share-hint');
  hint.textContent='準備中…';
  try{
    // 嘗試下載圖片並以 File 分享
    const files=[];
    for(const item of _shareItems){
      try{
        const res=await fetch(item.url);
        const blob=await res.blob();
        const ext=blob.type.split('/')[1]||'jpg';
        files.push(new File([blob],`${item.name||'image'}.${ext}`,{type:blob.type}));
      }catch(e){console.warn('fetch img fail',e);}
    }
    if(files.length===0)throw new Error('no files');
    if(navigator.canShare&&navigator.canShare({files})){
      await navigator.share({files});
      hint.textContent='✅ 已開啟分享';
    } else {
      throw new Error('canShare false');
    }
  }catch(e){
    if(e.name==='AbortError'){hint.textContent='';return;}
    // Fallback：開新分頁顯示圖片（用戶可長按儲存）
    hint.textContent='';
    if(_shareItems.length===1){
      window.open(_shareItems[0].url,'_blank');
    } else {
      // 多張：依序開啟
      _shareItems.forEach((it,i)=>setTimeout(()=>window.open(it.url,'_blank'),i*300));
    }
    showToast('已在新分頁開啟圖片，長按可儲存或分享');
  }
}

/* 複製全部連結 */
async function copyShareLinks(){
  const text=_shareItems.map(i=>i.url).join('\n');
  try{await navigator.clipboard.writeText(text);}
  catch(e){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();}
  document.getElementById('share-hint').textContent='✅ 連結已複製到剪貼簿';
  showToast('✅ 連結已複製','success');
}
async function copySingleLink(url,btn){
  try{await navigator.clipboard.writeText(url);}catch(e){}
  btn.textContent='✓';setTimeout(()=>btn.textContent='複製',2000);
}

async function handleFiles(files){
  if(!currentAlbumId){showToast('請先選擇相簿','error');return;}
  if(!cloudReady){showToast('⚠️ 請先設定 Cloudinary','error');return;}
  if(!jbReady){showToast('⚠️ 請先設定 JSONBin（讓他人也看得到）','error');return;}
  const album=allAlbums.find(a=>a.id===currentAlbumId);
  const remaining=200-(album?.imageCount||0);
  if(remaining<=0){showToast('此相簿已達 200 張上限','error');return;}
  const arr=Array.from(files).filter(f=>f.type.startsWith('image/')).slice(0,remaining);
  if(arr.length<files.length)showToast('略過超額或非圖片檔案','error');
  if(!arr.length)return;
  const list=document.getElementById('upload-list');
  for(const file of arr){
    const iid='u-'+Date.now()+Math.random().toString(36).slice(2,5);
    const thumbUrl=URL.createObjectURL(file);
    const el=document.createElement('div');
    el.className='upload-item';el.id=iid;
    el.innerHTML=`<img class="upload-thumb" src="${thumbUrl}" alt=""><div class="upload-info"><div class="upload-name">${v(file.name)}</div><div class="upload-prog-bg"><div class="upload-prog-bar" id="bar-${iid}" style="width:0%"></div></div><div class="upload-pct" id="pct-${iid}">準備中…</div></div>`;
    list.prepend(el);
    await doCloudinaryUpload(file,iid,album,thumbUrl);
  }
  document.getElementById('file-input').value='';
  populatePanel();
}
async function doCloudinaryUpload(file,iid,album,thumbUrl){
  const bar=document.getElementById(`bar-${iid}`),pct=document.getElementById(`pct-${iid}`);
  let fake=0;const timer=setInterval(()=>{fake=Math.min(fake+Math.random()*10,85);bar.style.width=Math.round(fake)+'%';pct.textContent=Math.round(fake)+'%';},200);
  const fd=new FormData();
  fd.append('file',file);fd.append('upload_preset',UPLOAD_PRESET);fd.append('folder',`hengpeng/${currentAlbumId}`);
  try{
    const res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd});
    clearInterval(timer);
    if(!res.ok)throw new Error((await res.json()).error?.message||res.statusText);
    const data=await res.json();
    bar.style.width='100%';pct.innerHTML='<span class="up-done">✓ 完成</span>';
    const imgData={id:data.public_id.replace(/\//g,'_')+'_'+Date.now(),publicId:data.public_id,url:data.secure_url,name:file.name,caption:'',uploadedAt:new Date().toISOString()};
    let imgs=getImages(currentAlbumId);
    // 依目前排序模式決定插入位置
    if(currentSort==='oldest'){
      imgs.push(imgData);  // 最舊在前 → 新圖放最後
    } else if(currentSort==='manual'){
      imgs.push(imgData);  // 手動排序 → 新圖放最後
    } else {
      imgs.unshift(imgData); // newest 或 name → 新圖放最前（最新優先）
    }
    if(!album.coverUrl)album.coverUrl=data.secure_url;
    await saveImages(currentAlbumId,imgs);
    // 重新載入排序後的圖片列表（而非直接 append，確保排序正確）
    loadImages();
    renderAlbums(allAlbums);updatePanelInfo(album);
    URL.revokeObjectURL(thumbUrl);
  }catch(ex){clearInterval(timer);pct.innerHTML=`<span class="up-err">✗ ${ex.message}</span>`;console.error(ex);}
}

/* ════════════ GLOBAL SEARCH ════════════ */
let _globalSearchTimer=null;
function globalSearch(q){
  clearTimeout(_globalSearchTimer);
  document.getElementById('global-search-clear').classList.toggle('show',q.length>0);
  if(!q.trim()){
    document.getElementById('global-search-results').classList.remove('show');
    document.getElementById('global-search-results').innerHTML='';
    document.getElementById('albums-grid').style.display='';
    return;
  }
  _globalSearchTimer=setTimeout(()=>_doGlobalSearch(q.trim()),300);
}
function clearGlobalSearch(){
  document.getElementById('float-search-back-btn').classList.remove('show');
  document.getElementById('global-search-input').value='';
  globalSearch('');
  document.getElementById('albums-view').scrollTop=0;
}
function _doGlobalSearch(q){
  const lq=q.toLowerCase().trim();
  // 特殊：* 代表搜尋說明中含有 * 的圖片（熱銷標記）
  const isHotSearch=(lq==='*');
  // 拆成多個關鍵字（空格分隔），所有字都要符合
  const tokens=lq.split(/\s+/).filter(Boolean);
  const results=[];
  _gsrFlatImgs=[];

  allAlbums.forEach(album=>{
    const albumText=((album.name||'')+' '+(album.desc||'')).toLowerCase();
    // 相簿名稱/描述完全符合 → 顯示全部圖片（熱銷模式下不適用）
    const albumMatch=!isHotSearch&&tokens.every(t=>albumText.includes(t));

    const imgs=getImages(album.id).filter(i=>{
      if(isHotSearch){
        // 熱銷：圖片說明或名稱含有 * 字元
        return (i.caption||'').includes('*')||(i.name||'').includes('*');
      }
      if(albumMatch) return true; // 相簿符合就顯示所有圖片
      // 圖片名稱或說明符合
      const imgText=(i.caption||'').toLowerCase();
      return tokens.every(t=>imgText.includes(t));
    });
    if(imgs.length){
      results.push({album,imgs});
      imgs.forEach(img=>_gsrFlatImgs.push({...img,_albumId:album.id,_albumName:album.name}));
    }
  });

  const rEl=document.getElementById('global-search-results');
  document.getElementById('albums-grid').style.display='none';
  rEl.classList.add('show');
  // 返回按鈕
  const backBtn=`<button class="gsr-back-btn" onclick="clearGlobalSearch()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    返回所有相簿
  </button>`;
  if(!results.length){
    rEl.innerHTML=backBtn+`<div class="gsr-no-result">找不到含「${v(q)}」的圖片</div>`;
    return;
  }
  // 修正：flat 計算用全部圖片數量，保證燈箱 index 正確
  let flat=0;
  rEl.innerHTML=backBtn+results.map(({album,imgs})=>{
    const startIdx=flat;
    flat+=imgs.length; // 用全部數量，不截斷
    return `
    <div class="gsr-album-title" onclick="openAlbum('${album.id}')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="14" rx="2"/><polyline points="3 9 12 15 21 9"/></svg>
      ${v(album.name)} <span style="font-size:.78rem;font-weight:400;color:var(--text-muted)">（${imgs.length} 張）</span>
    </div>
    <div class="gsr-imgs">
      ${imgs.map((img,i)=>`
        <div class="gsr-img-card" onclick="openGsrLightbox(${startIdx+i})">
          <img src="${v(img.url)}" alt="${v(img.name||'')}" loading="lazy">
          <div class="gsr-caption">${v(img.caption||img.name||'')}</div>
        </div>`).join('')}
    </div>`;
  }).join('');
}

// 全域搜尋結果燈箱
let _gsrFlatImgs=[];
function openGsrLightbox(idx){
  // 暫時把 filteredImages 設為搜尋結果
  filteredImages=_gsrFlatImgs;
  openLightbox(idx);
}

/* ════════════ IMAGE DRAG-DROP REORDER (admin) ════════════ */
let _imgDragId=null;
function imgDragStart(e,id){
  if(!isAdmin)return;
  _imgDragId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('imgId',id);
  const el=document.getElementById('ic-'+id);
  if(el)setTimeout(()=>el.classList.add('dragging'),0);
}
function imgDragOver(e,id){
  if(!isAdmin||!_imgDragId||_imgDragId===id)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.drag-over-img').forEach(el=>el.classList.remove('drag-over-img'));
  const el=document.getElementById('ic-'+id);
  if(el)el.classList.add('drag-over-img');
}
function imgDragLeave(e,id){
  const el=document.getElementById('ic-'+id);
  if(el)el.classList.remove('drag-over-img');
}
async function imgDrop(e,toId){
  e.preventDefault();
  if(!isAdmin)return;
  const fromId=e.dataTransfer.getData('imgId')||_imgDragId;
  document.querySelectorAll('.drag-over-img').forEach(el=>el.classList.remove('drag-over-img'));
  if(!fromId||fromId===toId)return;
  let imgs=getImages(currentAlbumId);
  const fi=imgs.findIndex(i=>i.id===fromId);
  const ti=imgs.findIndex(i=>i.id===toId);
  if(fi<0||ti<0)return;
  // 交換位置（swap）：只移動這一張，不影響其他圖片排列
  [imgs[fi],imgs[ti]]=[imgs[ti],imgs[fi]];
  // 設為手動排序並儲存到相簿物件，確保重新進入後維持
  currentSort='manual';
  const album=allAlbums.find(x=>x.id===currentAlbumId);
  if(album) album.sortMode='manual';
  syncSortSelect();
  await saveImages(currentAlbumId,imgs);
  currentImages=[...imgs];
  filteredImages=[...imgs];
  renderImages(filteredImages,false);
  showToast('✅ 圖片位置已交換','success');
}
function imgDragEnd(e,id){
  _imgDragId=null;
  document.querySelectorAll('.img-card').forEach(el=>{
    el.classList.remove('dragging');el.classList.remove('drag-over-img');
  });
}

/* ════════════ LONG PRESS (mobile) ════════════ */
let _lpTimer=null,_lpId=null,_lpMoved=false;
function lpStart(e,id){
  _lpMoved=false;
  _lpId=id;
  _lpTimer=setTimeout(()=>{
    if(!_lpMoved){
      navigator.vibrate&&navigator.vibrate(40);
      ctxSelect({stopPropagation:()=>{}},id);
      // 第一次進入多選模式時提示
      if(selectedIds.size===1){
        showToast('已選取，可繼續長按選取更多 → 點「分享」批次分享','success');
      }
    }
  },480);
}
function lpCancel(){_lpMoved=true;clearTimeout(_lpTimer);}
function lpEnd(){clearTimeout(_lpTimer);}

/* ════════════ SHARE (improved multi-image) ════════════ */
async function shareAsImages(){
  const hint=document.getElementById('share-hint');
  const btn=document.getElementById('share-img-btn');
  hint.textContent='下載圖片中…';
  btn.disabled=true;
  try{
    const files=[];
    for(let i=0;i<_shareItems.length;i++){
      const item=_shareItems[i];
      hint.textContent=`下載中 ${i+1}/${_shareItems.length}…`;
      try{
        const res=await fetch(item.url);
        const blob=await res.blob();
        const ext=blob.type.includes('png')?'png':blob.type.includes('gif')?'gif':'jpg';
        const safeName=(item.name||'image').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_').slice(0,40);
        files.push(new File([blob],`${safeName}.${ext}`,{type:blob.type}));
      }catch(e){console.warn('fetch fail',item.url,e);}
    }
    if(!files.length) throw new Error('no files');
    // 嘗試 Web Share API files（iOS Safari 15+ / Android Chrome 支援）
    if(navigator.canShare&&navigator.canShare({files})){
      hint.textContent='開啟系統分享…';
      await navigator.share({files});
      hint.textContent='✅ 分享完成';
    } else {
      throw new Error('canShare not supported');
    }
  }catch(e){
    if(e.name==='AbortError'){hint.textContent='';btn.disabled=false;return;}
    // Fallback: 逐張下載
    hint.textContent='';
    const anchor=document.createElement('a');
    anchor.target='_blank';
    for(let i=0;i<_shareItems.length;i++){
      const item=_shareItems[i];
      try{
        const res=await fetch(item.url);
        const blob=await res.blob();
        const url2=URL.createObjectURL(blob);
        const ext=blob.type.includes('png')?'png':'jpg';
        const safeName=(item.name||'image').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'_').slice(0,40);
        anchor.href=url2;
        anchor.download=`${safeName}.${ext}`;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url2);
        if(i<_shareItems.length-1) await new Promise(r=>setTimeout(r,600));
      }catch(err){window.open(item.url,'_blank');}
    }
    showToast(_shareItems.length>1?`已下載 ${_shareItems.length} 張圖片`:'圖片已下載','success');
  }
  btn.disabled=false;
}

init();
</script>
